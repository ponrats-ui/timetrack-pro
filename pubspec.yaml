name: timetrack_pro
description: Offline-first work time, OT, income, and expense tracker.
publish_to: 'none'
version: 0.9.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  excel: ^4.0.6
  flutter_riverpod: ^3.3.2
  path: ^1.9.1
  path_provider: ^2.1.6
  pdf: ^3.12.0
  share_plus: ^13.1.0
  fl_chart: ^1.2.0

dev_dependencies:
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  test: ^1.31.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/tahoma.ttf
